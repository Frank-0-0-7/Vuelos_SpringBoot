<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Reservas de Vuelos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-fluid py-5">
    <h1 class="text-center mb-5 fw-bold text-primary">✈️ Panel de Compra y Grilla de Reservas</h1>

    <div class="row px-3">
        <div class="col-md-5 mb-4">
            <div class="card p-4">
                <h3 class="mb-4 text-secondary border-bottom pb-2">📋 Datos del Pasajero</h3>
                <div id="alertContainer"></div>

                <form id="reservaForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">DNI</label>
                            <input type="text" id="dniStr" class="form-control" placeholder="Ej: 45999888">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="nombre@correo.com">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nombre</label>
                            <input type="text" id="nombre" class="form-control" placeholder="Juan">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Apellido</label>
                            <input type="text" id="apellido" class="form-control" placeholder="Perez">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" id="pass" class="form-control" placeholder="Clave de usuario">
                    </div>

                    <h4 class="mt-4 text-secondary border-bottom pb-2">✈️ Selección de Vuelo y Asiento</h4>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Vuelos Disponibles</label>
                        <select id="selectVuelo" class="form-select">
                            <option value="">-- Seleccione un vuelo --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Asientos Libres (Filtrados por el Back)</label>
                        <select id="selectAsiento" class="form-select" disabled>
                            <option value="">-- Primero elija un vuelo --</option>
                        </select>
                    </div>

                    <h4 class="mt-4 text-secondary border-bottom pb-2">💳 Información Financiera</h4>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Número de Tarjeta</label>
                        <input type="text" id="numTarjeta" class="form-control" placeholder="16 dígitos numéricos" maxlength="16">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Tipo</label>
                            <select id="tipoTarjetaStr" class="form-select">
                                <option value="CREDITO">CREDITO</option>
                                <option value="DEBITO">DEBITO</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Monto Total ($)</label>
                            <input type="text" id="montoStr" class="form-control" readonly placeholder="Calculado automático">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg mt-3 fw-bold">🚀 Procesar Reserva Completa</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                    <h3 class="text-secondary m-0">📊 Reservas Registradas (DTO)</h3>
                    <button id="btnActualizar" class="btn btn-outline-secondary btn-sm">🔄 Sincronizar Grilla</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th>Reserva #</th>
                            <th>Pasajero</th>
                            <th>Vuelo / Destino</th>
                            <th>Asiento</th>
                            <th>Pago / Tarjeta</th>
                            <th>Monto Total</th>
                        </tr>
                        </thead>
                        <tbody id="tablaReservasBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:9000/api/v1";
    let vuelosCached = [];

    // Al iniciar, cargamos los datos básicos
    document.addEventListener("DOMContentLoaded", async () => {
        await cargarVuelosSelector();
        await cargarGrillaReservas();
    });

    // 1. CARGAR SELECTOR DE VUELOS DESDE EL GET GENERAL
    async function cargarVuelosSelector() {
        try {
            const res = await fetch(`${API_BASE}/vuelos`);
            vuelosCached = await res.json();
            const selectVuelo = document.getElementById("selectVuelo");
            selectVuelo.innerHTML = '<option value="">-- Seleccione un vuelo --</option>';

            vuelosCached.forEach(v => {
                const opt = document.createElement("option");
                opt.value = v.numeroVuelo;
                opt.textContent = `Vuelo #${v.numeroVuelo}: ${v.aeropuertoOrigen.nombreAeropuerto} ➡️ ${v.aeropuertoDestino.nombreAeropuerto}`;
                selectVuelo.appendChild(opt);
            });
        } catch (err) {
            mostrarAlerta("Error al conectar con Spring Boot. Verifique la consola.", "danger");
        }
    }

    // 2. ESCUCHAR EL CAMBIO DE VUELO PARA CALCULAR MONTO Y LLAMAR AL NUEVO ENDPOINT
    document.getElementById("selectVuelo").addEventListener("change", async (e) => {
        const idVuelo = e.target.value;
        const selectAsiento = document.getElementById("selectAsiento");
        const inputMonto = document.getElementById("montoStr");

        if (!idVuelo) {
            selectAsiento.innerHTML = '<option value="">-- Primero elija un vuelo --</option>';
            selectAsiento.disabled = true;
            inputMonto.value = "";
            return;
        }

        // Cargamos el monto del precio basándonos en la caché local
        const vueloObj = vuelosCached.find(v => v.numeroVuelo == idVuelo);
        if (vueloObj && vueloObj.tarifas.length > 0) {
            const t = vueloObj.tarifas[0];
            inputMonto.value = (parseFloat(t.precioTarifa) + parseFloat(t.impuestoTarifa)).toFixed(2);
        }

        // Llamamos al endpoint de SQL inteligente para traer asientos verdaderamente libres
        try {
            const res = await fetch(`${API_BASE}/vuelos/${idVuelo}/asientos-libres`);
            const asientosLibres = await res.json();

            selectAsiento.innerHTML = '<option value="">-- Seleccione un asiento disponible --</option>';

            if (asientosLibres.length === 0) {
                selectAsiento.innerHTML = '<option value="">🚨 Vuelo Completo (Sin asientos libres)</option>';
                selectAsiento.disabled = true;
                return;
            }

            asientosLibres.forEach(a => {
                const opt = document.createElement("option");
                opt.value = a.idAsiento;
                opt.textContent = `Fila ${a.filaAsiento} - Asiento ${a.letraAsiento} (${a.claseAsiento})`;
                selectAsiento.appendChild(opt);
            });
            selectAsiento.disabled = false;

        } catch (err) {
            console.error("Error al traer asientos libres desde el Backend.", err);
        }
    });

    // 3. VALIDACIÓN FRONT-END (Primera línea de defensa requerida por la cátedra)
    function validarFormulario() {
        const dni = document.getElementById("dniStr").value.trim();
        const email = document.getElementById("email").value.trim();
        const nombre = document.getElementById("nombre").value.trim();
        const apellido = document.getElementById("apellido").value.trim();
        const pass = document.getElementById("pass").value.trim();
        const tarjeta = document.getElementById("numTarjeta").value.trim();
        const vuelo = document.getElementById("selectVuelo").value;
        const asiento = document.getElementById("selectAsiento").value;

        if (!dni || !email || !nombre || !apellido || !pass || !tarjeta || !vuelo || !asiento) {
            return "🛑 Validación Front: Todos los campos del formulario son obligatorios.";
        }
        if (isNaN(dni) || dni.length < 7) {
            return "🛑 Validación Front: El DNI introducido debe ser un número válido.";
        }
        if (isNaN(tarjeta) || tarjeta.length !== 16) {
            return "🛑 Validación Front: El número de tarjeta debe contener exactamente 16 dígitos.";
        }
        return null;
    }

    // 4. ENVIAR LA COMPRA AL POSTMAN WEB (POST)
    document.getElementById("reservaForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const errorFront = validarFormulario();
        if (errorFront) {
            mostrarAlerta(errorFront, "warning");
            return;
        }

        const payload = {
            dniStr: document.getElementById("dniStr").value.trim(),
            nombre: document.getElementById("nombre").value.trim(),
            apellido: document.getElementById("apellido").value.trim(),
            email: document.getElementById("email").value.trim(),
            pass: document.getElementById("pass").value.trim(),
            numTarjeta: document.getElementById("numTarjeta").value.trim(),
            tipoTarjetaStr: document.getElementById("tipoTarjetaStr").value,
            montoStr: document.getElementById("montoStr").value,
            idVuelo: parseInt(document.getElementById("selectVuelo").value),
            idAsiento: parseInt(document.getElementById("selectAsiento").value)
        };

        try {
            const res = await fetch(`${API_BASE}/reservas/realizar-completa`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                mostrarAlerta(`✅ ${data.mensaje}`, "success");
                document.getElementById("reservaForm").reset();
                document.getElementById("selectAsiento").disabled = true;
                // Forzamos al selector a actualizar los asientos libres en vivo
                document.getElementById("selectVuelo").dispatchEvent(new Event('change'));
                await cargarGrillaReservas();
            } else {
                mostrarAlerta(`❌ Servidor Backend reporta: ${data.error}`, "danger");
            }
        } catch (err) {
            mostrarAlerta("Error crítico en la comunicación de red.", "danger");
        }
    });

    // 5. RENDERIZAR TABLA DE RESERVAS DTO
    async function cargarGrillaReservas() {
        try {
            const res = await fetch(`${API_BASE}/reservas/tabla-web`);
            const dtos = await res.json();
            const tbody = document.getElementById("tablaReservasBody");
            tbody.innerHTML = "";

            if (dtos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-3">Sin transacciones registradas.</td></tr>';
                return;
            }

            dtos.forEach(r => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><span class="badge bg-secondary"># ${r.numeroReserva}</span></td>
                    <td><strong>${r.apellido}, ${r.nombre}</strong><br><small class="text-muted">DNI: ${r.dni}</small></td>
                    <td><span class="text-primary fw-bold">Vuelo ${r.numeroVuelo}</span> ➡️ ${r.ciudadDestino}<br><small class="text-muted">${r.fechaSalida}</small></td>
                    <td><span class="badge bg-info text-dark">Fila ${r.fila} - ${r.letra}</span></td>
                    <td><span class="text-success fw-bold">${r.tipoTarjeta}</span><br><small class="text-muted">****${r.numeroTarjeta.slice(-4)}</small></td>
                    <td class="fw-bold text-success">$ ${r.montoTotal}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.log("Error al refrescar la tabla del Front.");
        }
    }

    document.getElementById("btnActualizar").addEventListener("click", cargarGrillaReservas);

    function mostrarAlerta(msg, tipo) {
        document.getElementById("alertContainer").innerHTML = `
            <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                ${msg} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
